version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DB_URI=postgresql://shopminer:shopminer@db:5432/shopminer
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shopminer
      POSTGRES_PASSWORD: shopminer
      POSTGRES_DB: shopminer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopminer"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: