  - name: 验证预测指标含cv_folds字段
    field: cv_folds
    expected_present: true
  - name: 验证预测指标含best_r2字段
    field: best_r2
    expected_present: true
  - name: 验证预测指标含version字段
    field: version
    expected_present: true

