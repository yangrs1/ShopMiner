# ============================================================
# 模型可视化数据接口 (新)
# /api/v1/analytics/viz/<model>
# ============================================================
model_viz:
  - name: 管理员获取聚类可视化数据(phase3别名)
    model: phase3
    as_admin: true
    expected_status: 200
  - name: 管理员获取流失预警可视化数据(phase4别名)
    model: phase4
    as_admin: true
    expected_status: 200
  - name: 管理员获取销售预测可视化数据(phase5别名)
    model: phase5
    as_admin: true
    expected_status: 200
  - name: 管理员获取关联规则可视化数据(phase6别名)
    model: phase6
    as_admin: true
    expected_status: 200
  - name: 管理员获取聚类可视化数据(Clustering别名)
    model: Clustering
    as_admin: true
    expected_status: 200
  - name: 管理员获取流失预警可视化数据(Churn别名)
    model: Churn
    as_admin: true
    expected_status: 200
  - name: 管理员获取销售预测可视化数据(SalesForecast别名)
    model: SalesForecast
    as_admin: true
    expected_status: 200
  - name: 管理员获取关联规则可视化数据(Association别名)
    model: Association
    as_admin: true
    expected_status: 200
  - name: 管理员请求不存在的模型
    model: nonexistent_model
    as_admin: true
    expected_status: 404
  - name: 普通用户获取聚类可视化数据-禁止
    model: phase3
    as_admin: false
    expected_status: 403
  - name: 未登录访问viz接口-禁止
    model: phase3
    as_admin: none
    expected_status: 401

# ============================================================
# 模型版本字段验证 (新)
# 验证 DB 中 4 个模型的 version 字段
# ============================================================
model_version:
  - name: 聚类模型版本为v4_optuna
    model_name: Clustering
    expected_version: v4_optuna
  - name: 流失预警模型版本为v8_xgb_shap_K50
    model_name: Churn
    expected_version: v8_xgb_shap_K50
  - name: 销售预测模型版本为v3_calendar_features
    model_name: SalesForecast
    expected_version: v3_calendar_features
  - name: 关联规则模型版本为v3_dual_level
    model_name: Association
    expected_version: v3_dual_level

# ============================================================
# 预测指标新字段验证 (新)
# /api/v1/analytics/sales/prediction-metrics
# 新增 cv_smape_std, cv_folds, best_r2 字段
