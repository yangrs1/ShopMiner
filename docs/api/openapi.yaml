      description: 获取某商品的关联推荐列表（基于 Apriori 算法）
      operationId: getProductRecommendations
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: integer
          description: 商品 ID
      responses:
        "200":
          description: 成功返回关联推荐
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsDataResponse"

  # ============================================================
  # Analytics - Churn Prediction
  # ============================================================
  /api/v1/analytics/churn/list:
    get:
      tags:
        - Analytics
      summary: List churn predictions (Admin)
      description: 管理员获取客户流失预警列表（分页，可筛选高风险）
      operationId: listChurnPredictions
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: 页码
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
          description: 每页数量
        - name: risk_only
          in: query
          schema:
            type: string
            enum: ["0", "1"]
            default: "0"
          description: 是否仅返回高风险客户（1=是）
      responses:
        "200":
          description: 成功返回流失预警列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChurnListResponse"
        "403":
          description: 无管理员权限
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/analytics/churn/importance:
    get:
      tags:
        - Analytics
      summary: Get churn feature importance (Admin)
      description: 管理员获取流失预警模型特征重要性
      operationId: getChurnImportance
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 成功返回特征重要性
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsDataResponse"
        "403":
          description: 无管理员权限
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/analytics/churn/trend:
    get:
      tags:
        - Analytics
      summary: Get churn trend (Admin)
      description: 管理员获取流失趋势数据
      operationId: getChurnTrend
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 成功返回流失趋势
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsDataResponse"
        "403":
          description: 无管理员权限
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/analytics/churn/{churn_id}/status:
    put:
      tags:
        - Analytics
      summary: Update churn status (Admin)
      description: 管理员更新流失预警记录的处理状态
      operationId: updateChurnStatus
      security:
        - BearerAuth: []
      parameters:
        - name: churn_id
          in: path
          required: true
          schema:
            type: integer
          description: 流失预警 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  description: 处理状态
                  example: contacted
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChurnStatusResponse"
        "400":
          description: 无效的 churn_id 或状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: 无管理员权限
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ============================================================
  # Analytics - User Personal
  # ============================================================
  /api/v1/analytics/user/rfm:
    get:
      tags:
        - Analytics
      summary: Get user RFM
      description: 当前用户获取自己的 RFM 分析报告（含雷达图数据）
      operationId: getUserRfm
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 成功返回用户 RFM 报告
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsDataResponse"
        "401":
          description: 未认证
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/analytics/user/trend:
    get:
      tags:
        - Analytics
      summary: Get user consumption trend
      description: 当前用户获取自己的消费趋势（按月汇总）
      operationId: getUserConsumptionTrend
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 成功返回消费趋势
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsDataResponse"
        "401":
          description: 未认证
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/analytics/user/category-preference:
    get:
      tags:
        - Analytics
      summary: Get user category preference
      description: 当前用户获取自己的品类偏好分析
      operationId: getUserCategoryPreference
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 成功返回品类偏好
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsDataResponse"
        "401":
          description: 未认证
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ============================================================
  # Analytics - Model Metrics
  # ============================================================
  /api/v1/analytics/metrics:
    get:
      tags:
        - Analytics
      summary: Get model metrics (Admin)
      description: 管理员获取各数据挖掘模型的评估指标，可按模型名称筛选
      operationId: getModelMetrics
      security:
        - BearerAuth: []
      parameters:
        - name: model
          in: query
          schema:
            type: string
          description: 模型名称筛选（如 Clustering, Churn, SalesForecast, Association）
      responses:
        "200":
          description: 成功返回模型指标
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsDataResponse"
        "403":
          description: 无管理员权限
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ============================================================
  # Analytics - Hot Products
  # ============================================================
  /api/v1/analytics/products/hot:
    get:
      tags:
        - Analytics
      summary: Get hot products
      description: 获取热门商品列表（可按分类筛选，无需登录）
      operationId: getHotProducts
      parameters:
        - name: category
          in: query
          schema:
            type: string
          description: 分类名称筛选
        - name: limit
          in: query
          schema:
            type: integer
            default: 6
          description: 返回数量上限
      responses:
        "200":
          description: 成功返回热门商品
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HotProductsResponse"

  # ============================================================
  # Analytics - Admin Recompute
  # ============================================================
  /api/v1/analytics/admin/recompute:
    post:
      tags:
        - Analytics
      summary: Trigger recompute (Admin)
      description: 管理员触发数据挖掘模型重新计算
      operationId: adminRecompute
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 重算任务触发成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsDataResponse"
        "403":
          description: 无管理员权限
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/analytics/admin/last-compute-time:
    get:
      tags:
        - Analytics
      summary: Get last compute time (Admin)
      description: 管理员获取最近一次模型计算的时间
      operationId: getLastComputeTime
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 成功返回最后计算时间
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsDataResponse"
        "403":
          description: 无管理员权限
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ============================================================
  # Analytics - Model Visualization
  # ============================================================
  /api/v1/analytics/viz/{model}:
    get:
      tags:
        - Analytics
      summary: Get model visualization data (Admin)
      description: 管理员获取指定模型的可视化预计算数据
      operationId: getModelViz
      security:
        - BearerAuth: []
      parameters:
        - name: model
          in: path
          required: true
          schema:
            type: string
          description: |
            模型名称别名:
            - phase3 / Clustering: 客户分群
            - phase4 / Churn: 流失预警
            - phase5 / SalesForecast: 销售预测
            - phase6 / Association: 关联规则
      responses:
        "200":
          description: 成功返回可视化数据
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsDataResponse"
        "403":
          description: 无管理员权限
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 指定模型无可视化数据
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ============================================================
  # Reviews
  # ============================================================
  /api/v1/reviews/product/{product_id}:
    get:
      tags:
        - Reviews
      summary: Get product reviews
      description: 获取某商品的所有评价（分页，含平均评分）
      operationId: getProductReviews
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: integer
          description: 商品 ID
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: 页码
        - name: per_page
          in: query
          schema:
            type: integer
            default: 10
          description: 每页数量
      responses:
        "200":
          description: 成功返回评价列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewListResponse"

  /api/v1/reviews:
    post:
      tags:
        - Reviews
      summary: Create review
      description: 创建或更新商品评价（同一用户对同一商品只能有一条评价，重复提交则更新）
      operationId: createReview
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewRequest"
      responses:
        "201":
          description: 评价创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewItemResponse"
        "200":
          description: 评价更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewItemResponse"
        "400":
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 未认证
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 在请求头中添加 `Authorization: Bearer <token>`

  schemas:
    # ==========================================================
    # Unified Response Schemas
    # ==========================================================
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          description: 业务状态码（200=成功，4xx=客户端错误，5xx=服务端错误）
        message:
          type: string
          description: 响应消息
        data:
          description: 响应数据（具体结构视接口而定）

    SimpleResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          example: 400
        message:
          type: string
          example: 请求参数错误

    # ==========================================================
    # Health
    # ==========================================================
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded]
          description: 服务状态
          example: healthy
        timestamp:
          type: string
          format: date-time
          description: 当前 UTC 时间
        version:
          type: string
          description: API 版本
          example: "1.0.0"
        database:
          type: string
          enum: [connected, disconnected]
          description: 数据库连接状态

    # ==========================================================
    # User
    # ==========================================================
    User:
      type: object
      properties:
        id:
          type: integer
          description: 用户 ID
        first_name:
          type: string
          description: 名
        last_name:
          type: string
          description: 姓
        phone:
          type: string
          description: 电话号码
        address:
          type: string
          description: 地址
        email:
          type: string
          format: email
          description: 邮箱
        icon:
          type: string
          description: 头像文件名
        balance:
          type: integer
          description: 账户余额（分）
        role:
          type: string
          enum: [customer, admin]
          description: 用户角色
        created_at:
          type: string
          format: date-time
          description: 注册时间

    UserResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          $ref: "#/components/schemas/User"

    AuthResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: Login successful
        data:
          type: object
          properties:
            access_token:
              type: string
              description: JWT Token
            user:
              $ref: "#/components/schemas/User"

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - first_name
        - last_name
      properties:
        email:
          type: string
          format: email
          description: 邮箱地址
          example: user@example.com
        password:
          type: string
          description: 密码（需符合安全要求）
          example: Test@123
        first_name:
          type: string
          description: 名
          example: John
        last_name:
          type: string
          description: 姓
          example: Doe
        address:
          type: string
          description: 地址（可选）
          example: 123 Main St
        icon:
          type: string
          description: 头像图标（可选，默认 icon_bear.png）
          example: icon_bear.png

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: 邮箱地址
          example: customer@shopminer.com
        password:
          type: string
          description: 密码
          example: Customer@123

    UpdateUserRequest:
      type: object
      properties:
        first_name:
          type: string
          description: 名
        last_name:
          type: string
          description: 姓
        phone:
          type: string
          description: 电话号码
        address:
          type: string
          description: 地址
        password:
          type: string
          description: 新密码（留空不修改）

    RechargeRequest:
      type: object
      required:
        - amount
      properties:
        amount:
          type: integer
          description: 充值金额（分），须为正数，上限 10,000,000
          example: 10000

    # ==========================================================
    # Product
    # ==========================================================
    Product:
      type: object
      properties:
        id:
          type: integer
          description: 商品 ID
        name:
          type: string
          description: 商品名称
        description:
          type: string
          description: 商品描述
        image:
          type: string
          description: 图片 URL
        price:
          type: integer
          description: 价格（分）
        stock:
          type: integer
          description: 库存数量
        type:
          type: string
          description: 商品类型
        category_name:
          type: string
          description: 分类名称
        is_active:
          type: boolean
          description: 是否上架
        created_at:
          type: string
          format: date-time
          description: 创建时间

    ProductResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          $ref: "#/components/schemas/Product"

    ProductCreateRequest:
      type: object
      required:
        - name
        - description
        - image
        - price
        - type
        - stock
      properties:
        name:
          type: string
          description: 商品名称
          example: 新商品
        description:
          type: string
          description: 商品描述
          example: 这是一件优质商品
        image:
          type: string
          description: 图片 URL
          example: /img/product.jpg
        price:
          type: integer
          description: 价格（分），不可为负数
          example: 4999
        stock:
          type: integer
          description: 库存数量
          example: 100
        type:
          type: string
          description: 商品类型
          example: tshirt
        category_name:
          type: string
          description: 分类名称
          example: 电子产品

    ProductUpdateRequest:
      type: object
      properties:
        name:
          type: string
          description: 商品名称
        description:
          type: string
          description: 商品描述
        image:
          type: string
          description: 图片 URL
        price:
          type: integer
          description: 价格（分）
        stock:
          type: integer
          description: 库存数量
        type:
          type: string
          description: 商品类型
        category_name:
          type: string
          description: 分类名称
        is_active:
          type: boolean
          description: 是否上架

    AdminProductCreateRequest:
      type: object
      required:
        - name
        - price
        - stock
      properties:
        name:
          type: string
          description: 商品名称
          example: 新商品
        description:
          type: string
          description: 商品描述
          example: 这是一件优质商品
        image:
          type: string
          description: 图片 URL
          example: /img/product.jpg
        price:
          type: integer
          description: 价格（分），须为正整数
          example: 4999
        stock:
          type: integer
          description: 库存数量，须为非负整数
          example: 100
        type:
          type: string
          description: 商品类型
          example: physical
        category_name:
          type: string
          description: 分类名称
          example: 电子产品

    AdminProductUpdateRequest:
      type: object
      properties:
        name:
          type: string
          description: 商品名称（不能为空）
        description:
          type: string
          description: 商品描述
        image:
          type: string
          description: 图片 URL
        price:
          type: integer
          description: 价格（分），须为正整数
        stock:
          type: integer
          description: 库存数量，须为非负整数
        type:
          type: string
          description: 商品类型
        category_name:
          type: string
          description: 分类名称

    ProductListResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          type: object
          properties:
            products:
              type: array
              items:
                $ref: "#/components/schemas/Product"
            total:
              type: integer
              description: 商品总数
            pages:
              type: integer
              description: 总页数
            page:
              type: integer
              description: 当前页码

    AdminProductListResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          type: object
          properties:
            products:
              type: array
              items:
                $ref: "#/components/schemas/Product"
            total:
              type: integer
            pages:
              type: integer
            page:
              type: integer

    CategoryListResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          type: object
          properties:
            categories:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                    description: 分类名称
                  count:
                    type: integer
                    description: 该分类下的商品数量

    ProductRatingsResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          type: object
          additionalProperties:
            type: object
            properties:
              avg_rating:
                type: number
                format: float
                description: 平均评分
              total_reviews:
                type: integer
                description: 评价总数

    ProductRatingDetailResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          type: object
          properties:
            product_id:
              type: integer
            avg_rating:
              type: number
              format: float
              description: 平均评分
            total_reviews:
              type: integer
              description: 评价总数

    # ==========================================================
    # Cart
    # ==========================================================
    CartItem:
      type: object
      properties:
        id:
          type: integer
          description: 商品 ID
        product_id:
          type: integer
          description: 商品 ID
        name:
          type: string
          description: 商品名称
        price:
          type: integer
          description: 单价（分）
        image:
          type: string
          description: 商品图片 URL
        stock:
          type: integer
          description: 库存数量
        quantity:
          type: integer
          description: 购物车中的数量

    CartResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/CartItem"
            total_amount:
              type: integer
              description: 购物车总金额（分）
            item_count:
              type: integer
              description: 商品种类数

    CartItemsResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"

    AddToCartRequest:
      type: object
      required:
        - product_id
      properties:
        product_id:
          type: integer
          description: 商品 ID
          example: 1
