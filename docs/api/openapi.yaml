openapi: "3.0.3"
info:
  title: ShopMiner API - 智能电商平台
  description: |
    ShopMiner 是一个将数据挖掘与电商系统深度结合的全栈 Web 应用。
    具备完整的电商功能（用户、商品、购物车、订单、支付），
    内置 RFM 客户分群、销量预测、流失预警和关联规则推荐四大数据挖掘模块。

    ## 统一响应格式
    所有 API 统一返回 JSON 格式：
    ```json
    {
      "code": 200,
      "message": "success",
      "data": { ... }
    }
    ```

    ## 认证方式
    使用 JWT Bearer Token。在请求头中添加：
    ```
    Authorization: Bearer <token>
    ```

    ## 金额单位
    价格金额以 **分（fen）** 为单位（1 元 = 100 分），返回值为整数。
  version: "1.0.0"
  contact:
    name: ShopMiner Team
  license:
    name: MIT

servers:
  - url: http://127.0.0.1:5000
    description: 本地开发服务器

paths:
  # ============================================================
  # Health
  # ============================================================
  /api/v1/health:
    get:
      tags:
        - Health
      summary: Health check
      description: 服务健康检查，检测数据库连接状态
      operationId: healthCheck
      responses:
        "200":
          description: 健康状态返回
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  # ============================================================
  # Auth
  # ============================================================
  /api/v1/auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      description: 用户注册，创建新账户并返回 JWT Token
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: 请求参数错误（缺少必填字段、邮箱格式无效、密码不符合要求）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: 邮箱已被注册
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/login:
    post:
      tags:
        - Auth
      summary: Login
      description: 用户登录，验证邮箱和密码，返回 JWT Token
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: 缺少邮箱或密码
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 邮箱或密码错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/me:
    get:
      tags:
        - Auth
      summary: Get current user
      description: 获取当前登录用户的个人信息
      operationId: getCurrentUser
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 成功返回用户信息
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: 未认证
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags:
        - Auth
      summary: Update current user
      description: 更新当前登录用户的个人信息（姓名、电话、地址、密码等）
      operationId: updateCurrentUser
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: 未认证
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/me/recharge:
    post:
      tags:
        - Auth
      summary: Recharge balance
      description: 当前登录用户充值账户余额（金额单位为分）
      operationId: rechargeBalance
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RechargeRequest"
      responses:
        "200":
          description: 充值成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: 金额无效（非正数或超过上限 10,000,000 分）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 未认证
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ============================================================
  # Products
  # ============================================================
  /api/v1/products:
    get:
      tags:
        - Products
      summary: List products
      description: 获取上架商品列表，支持分页、搜索、分类筛选、价格区间、排序
      operationId: getProducts
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: 页码
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
          description: 每页数量
        - name: type
          in: query
          schema:
            type: string
          description: 商品类型筛选
        - name: category
          in: query
          schema:
            type: string
          description: 商品分类筛选
        - name: q
          in: query
          schema:
            type: string
          description: 搜索关键词（匹配名称和描述）
        - name: min_price
          in: query
          schema:
            type: integer
          description: 最低价格（分）
        - name: max_price
          in: query
          schema:
            type: integer
          description: 最高价格（分）
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [price, rating, created_at]
            default: created_at
          description: 排序字段
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: 排序方向
      responses:
        "200":
          description: 成功返回商品列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
        "400":
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags:
        - Products
      summary: Create product (Admin)
      description: 管理员创建新商品
      operationId: createProduct
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductCreateRequest"
      responses:
        "201":
          description: 商品创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "400":
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: 无管理员权限
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/products/categories:
    get:
      tags:
        - Products
      summary: List product categories
      description: 获取所有商品分类及其商品数量
      operationId: getCategories
      responses:
        "200":
          description: 成功返回分类列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryListResponse"

  /api/v1/products/ratings:
    get:
      tags:
        - Products
      summary: Get products ratings
      description: 批量获取商品的评分和评价数量（通过 product_ids 逗号分隔）
      operationId: getProductsRatings
      parameters:
        - name: product_ids
          in: query
          required: true
          schema:
            type: string
          description: 商品 ID 列表，逗号分隔，如 "1,2,3"
      responses:
        "200":
          description: 成功返回评分数据
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductRatingsResponse"

  /api/v1/products/{product_id}:
    get:
      tags:
        - Products
      summary: Get product detail
      description: 获取单个商品的详细信息（已登录用户访问会自动记录浏览行为）
      operationId: getProductById
      security:
        - BearerAuth: []
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: integer
          description: 商品 ID
      responses:
        "200":
          description: 成功返回商品详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "404":
          description: 商品不存在或已下架
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags:
        - Products
      summary: Update product (Admin)
      description: 管理员更新商品信息
      operationId: updateProduct
      security:
        - BearerAuth: []
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: integer
          description: 商品 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdateRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "400":
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: 无管理员权限
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 商品不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags:
        - Products
      summary: Deactivate product (Admin)
      description: 管理员下架商品（软删除，设置 is_active=false）
      operationId: deactivateProduct
      security:
        - BearerAuth: []
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: integer
          description: 商品 ID
      responses:
        "200":
          description: 下架成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleResponse"
        "403":
          description: 无管理员权限
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 商品不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/products/{product_id}/rating:
    get:
      tags:
        - Products
      summary: Get product rating
      description: 获取单个商品的平均评分和评价数量
      operationId: getProductRating
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: integer
          description: 商品 ID
      responses:
        "200":
          description: 成功返回评分信息
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductRatingDetailResponse"

  # ============================================================
  # Cart
  # ============================================================
  /api/v1/cart:
    get:
      tags:
        - Cart
      summary: Get cart
      description: 获取当前用户的购物车列表
      operationId: getCart
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 成功返回购物车内容
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartResponse"
        "401":
          description: 未认证
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags:
        - Cart
      summary: Add to cart
      description: 将商品添加到购物车（已存在则合并数量）
      operationId: addToCart
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddToCartRequest"
      responses:
        "200":
          description: 添加成功（包含合并）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartItemsResponse"
        "400":
          description: 请求参数错误或库存不足
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 未认证
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 商品不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags:
        - Cart
      summary: Clear cart
      description: 清空当前用户的购物车
      operationId: clearCart
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 清空成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyCartResponse"
        "401":
          description: 未认证
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/cart/{product_id}:
    put:
      tags:
        - Cart
      summary: Update cart item quantity
      description: 更新购物车中某商品的数量
      operationId: updateCartItem
      security:
        - BearerAuth: []
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: integer
          description: 商品 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCartItemRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartItemsResponse"
        "400":
          description: 数量无效或库存不足
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 未认证
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 商品不在购物车中
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags:
        - Cart
      summary: Remove from cart
      description: 从购物车中移除指定商品
      operationId: removeFromCart
      security:
        - BearerAuth: []
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: integer
          description: 商品 ID
      responses:
        "200":
          description: 移除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartItemsResponse"
        "401":
          description: 未认证
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 购物车中未找到该商品
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ============================================================
  # Orders
  # ============================================================
  /api/v1/orders:
    post:
      tags:
        - Orders
      summary: Create order
      description: 从购物车创建订单（包含事务与并发控制）
      operationId: createOrder
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: 订单创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "400":
          description: 购物车为空或库存不足
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 未认证
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      tags:
        - Orders
      summary: List user orders
      description: 获取当前用户的订单列表（分页）
      operationId: getUserOrders
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: 页码
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
          description: 每页数量
      responses:
        "200":
          description: 成功返回订单列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"
        "401":
          description: 未认证
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/orders/{order_id}:
    get:
      tags:
        - Orders
      summary: Get order detail
      description: 获取单个订单的详细信息（含商品项和状态日志）
      operationId: getOrderById
      security:
        - BearerAuth: []
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: integer
          description: 订单 ID
      responses:
        "200":
          description: 成功返回订单详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "403":
          description: 无权访问（非本人订单）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 订单不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/orders/{order_id}/cancel:
    post:
      tags:
        - Orders
      summary: Cancel order
      description: 取消订单（待支付状态直接取消，已支付状态自动退款）
      operationId: cancelOrder
      security:
        - BearerAuth: []
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: integer
          description: 订单 ID
      responses:
        "200":
          description: 取消成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "400":
          description: 订单状态不允许取消
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: 无权操作
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 订单不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/orders/{order_id}/pay:
    post:
      tags:
        - Orders
      summary: Pay order
      description: 支付订单（扣除用户余额）
      operationId: payOrder
      security:
        - BearerAuth: []
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: integer
          description: 订单 ID
      responses:
        "200":
          description: 支付成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "400":
          description: 订单状态不允许支付或余额不足
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: 无权操作
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 订单不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/orders/{order_id}/deliver:
    post:
      tags:
        - Orders
      summary: Confirm delivery
      description: 用户确认收货
      operationId: confirmDelivery
      security:
        - BearerAuth: []
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: integer
          description: 订单 ID
      responses:
        "200":
          description: 确认收货成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "400":
          description: 订单状态不允许确认收货
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 订单不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/orders/{order_id}/status-logs:
    get:
      tags:
        - Orders
      summary: Get order status logs
      description: 获取订单的状态变更历史日志
      operationId: getOrderStatusLogs
      security:
        - BearerAuth: []
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: integer
          description: 订单 ID
      responses:
        "200":
          description: 成功返回状态日志列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusLogListResponse"
        "403":
          description: 无权访问
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 订单不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ============================================================
  # Favorites
  # ============================================================
  /api/v1/favorites:
    get:
      tags:
        - Favorites
      summary: List favorites
      description: 获取当前用户的收藏列表（分页）
      operationId: listFavorites
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: 页码
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
          description: 每页数量
      responses:
