# =============================================================================
# ShopMiner Nginx Production Configuration
# =============================================================================
#
# Place this file at:
#   /etc/nginx/sites-available/shopminer
#
# Then enable it:
#   sudo ln -s /etc/nginx/sites-available/shopminer /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# For SSL certificate (Let's Encrypt):
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d shopminer.example.com
#
# =============================================================================

upstream shopminer_app {
    server 127.0.0.1:5000;
    keepalive 32;
}

# ---------------------------------------------------------------------------
# HTTP -> HTTPS redirect
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name shopminer.example.com;

    # Let Certbot can verify ownership before SSL is in place
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS server
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name shopminer.example.com;

    # ------------------------------------------------------------------
    # SSL certificates (Let's Encrypt via Certbot)
    # ------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/shopminer.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shopminer.example.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/shopminer.example.com/chain.pem;

    # Modern TLS configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ------------------------------------------------------------------
    # Root and index
    # ------------------------------------------------------------------
    root /opt/shopminer;
    index index.html;

    # ------------------------------------------------------------------
    # Security headers
    # ------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ------------------------------------------------------------------
    # Rate limiting zone (shared across all locations)
    # ------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=shopminer_limit:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=shopminer_conn:10m;

    # ------------------------------------------------------------------
    # Logging
    # ------------------------------------------------------------------
    access_log /var/log/nginx/shopminer_access.log;
    error_log  /var/log/nginx/shopminer_error.log;

    # ------------------------------------------------------------------
    # Static files - uploaded media
    # ------------------------------------------------------------------
    location /static/ {
        alias /opt/shopminer/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ------------------------------------------------------------------
    # Static files - images (legacy path)
    # ------------------------------------------------------------------
    location /images/ {
        alias /opt/shopminer/static/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ------------------------------------------------------------------
    # Static files - frontend Vue 3 SPA build output
    # ------------------------------------------------------------------
    location /frontend/dist/ {
        alias /opt/shopminer/frontend/dist/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ------------------------------------------------------------------
    # Favicon
    # ------------------------------------------------------------------
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    # ------------------------------------------------------------------
    # API proxy to Gunicorn
    # ------------------------------------------------------------------
    location / {
        # Rate limiting
        limit_req zone=shopminer_limit burst=20 nodelay;
        limit_conn shopminer_conn 10;

        # Proxy headers
        proxy_pass http://shopminer_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        send_timeout          60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 64k;

        # Client body size (adjust for file uploads)
        client_max_body_size 16m;
        client_body_buffer_size 128k;
    }

    # ------------------------------------------------------------------
    # Deny access to sensitive paths
    # ------------------------------------------------------------------
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ (\.env|\.git|\.ini|\.pem|config\.json)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
