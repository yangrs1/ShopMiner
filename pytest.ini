[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --alluredir=tests/report/allure-results
markers =
    api: API接口测试
    web: Web UI测试
    unit: 单元测试
    security: 安全测试
    smoke: 冒烟测试
    regression: 回归测试
    slow: 慢速测试
    db_verify: 需要数据库验证
    admin_only: 仅管理员可用
    auth_required: 需要登录
    requests_mode: requests真实HTTP模式
    client_mode: test_client快速模式
